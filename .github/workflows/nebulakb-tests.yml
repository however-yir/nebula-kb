name: NebulaKB Tests

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - "apps/**"
      - "deploy/**"
      - "docs/ops/**"
      - "docs/quality/**"
      - ".github/workflows/nebulakb-tests.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "pyproject.toml"
      - "config_example.yml"
      - "scripts/**"
      - "scripts/quality-gate.sh"
  pull_request:
    branches:
      - main
      - master
      - dev
    paths:
      - "apps/**"
      - "deploy/**"
      - "docs/ops/**"
      - "docs/quality/**"
      - ".github/workflows/nebulakb-tests.yml"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "pyproject.toml"
      - "config_example.yml"
      - "scripts/**"
      - "scripts/quality-gate.sh"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: nebulakb-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  django-test-suites:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: unit
            test_targets: "users tools"
            db_backend: sqlite
            db_engine: django.db.backends.sqlite3
            db_name: /tmp/nebula-test.sqlite3
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: root
            db_password: test-password
          - suite: unit
            test_targets: "users tools"
            db_backend: postgres
            db_engine: django.db.backends.postgresql
            db_name: postgres
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: postgres
            db_password: postgres
          - suite: api
            test_targets: "chat"
            db_backend: sqlite
            db_engine: django.db.backends.sqlite3
            db_name: /tmp/nebula-test.sqlite3
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: root
            db_password: test-password
          - suite: api
            test_targets: "chat"
            db_backend: postgres
            db_engine: django.db.backends.postgresql
            db_name: postgres
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: postgres
            db_password: postgres
          - suite: integration
            test_targets: "users.tests.LoginSerializerTests knowledge.tests.KnowledgeRetrievalTests tools.tests.ToolConnectionTests"
            db_backend: sqlite
            db_engine: django.db.backends.sqlite3
            db_name: /tmp/nebula-test.sqlite3
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: root
            db_password: test-password
          - suite: integration
            test_targets: "users.tests.LoginSerializerTests knowledge.tests.KnowledgeRetrievalTests tools.tests.ToolConnectionTests"
            db_backend: postgres
            db_engine: django.db.backends.postgresql
            db_name: postgres
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: postgres
            db_password: postgres
          - suite: risk-regression
            test_targets: "application knowledge system_manage"
            db_backend: sqlite
            db_engine: django.db.backends.sqlite3
            db_name: /tmp/nebula-test.sqlite3
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: root
            db_password: test-password
          - suite: risk-regression
            test_targets: "application knowledge system_manage"
            db_backend: postgres
            db_engine: django.db.backends.postgresql
            db_name: postgres
            db_host: 127.0.0.1
            db_port: "5432"
            db_user: postgres
            db_password: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: ${{ github.workspace }}/apps
      DJANGO_SETTINGS_MODULE: nebula.settings.test
      NEBULA_CONFIG_TYPE: ENV
      NEBULA_DATA_DIR: /tmp/nebula-ci-data
      NEBULA_DB_NAME: ${{ matrix.db_name }}
      NEBULA_DB_HOST: ${{ matrix.db_host }}
      NEBULA_DB_PORT: ${{ matrix.db_port }}
      NEBULA_DB_USER: ${{ matrix.db_user }}
      NEBULA_DB_PASSWORD: ${{ matrix.db_password }}
      NEBULA_DB_ENGINE: ${{ matrix.db_engine }}
      NEBULA_DB_MAX_OVERFLOW: "10"
      NEBULA_REDIS_HOST: 127.0.0.1
      NEBULA_REDIS_PORT: "6379"
      NEBULA_REDIS_PASSWORD: test-password
      NEBULA_REDIS_DB: "0"
      NEBULA_REDIS_MAX_CONNECTIONS: "10"
      NEBULA_ENABLE_FORCE_GC: "0"
      NEBULA_LANGUAGE_CODE: zh-CN
      NEBULA_TIME_ZONE: Asia/Shanghai
      COVERAGE_FAIL_UNDER: "40"
      CORE_COVERAGE_SOURCE: apps/users,apps/chat,apps/knowledge,apps/tools,apps/application,apps/system_manage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "coverage==7.6.1" \
            "django==5.2.12" \
            "drf-spectacular[sidecar]==0.28.0" \
            "django-redis==6.0.0" \
            "django-db-connection-pool==1.2.6" \
            "django-mptt==0.17.0" \
            "psycopg[binary]==3.2.9" \
            "python-dotenv==1.1.1" \
            "uuid-utils==0.14.0" \
            "captcha==0.7.1" \
            "pytz==2025.2" \
            "psutil==7.0.0" \
            "cffi==1.17.1" \
            "beautifulsoup4==4.13.4" \
            "requests==2.32.5" \
            "pydub==0.25.1" \
            "pysilk==0.0.1" \
            "celery[sqlalchemy]==5.5.3" \
            "django-celery-beat==2.9.0" \
            "celery-once==3.0.1" \
            "django-apscheduler==0.7.0" \
            "html2text==2025.4.15" \
            "openpyxl==3.1.5" \
            "python-docx==1.2.0" \
            "xlrd==2.0.2" \
            "xlwt==1.3.0" \
            "pymupdf==1.26.3" \
            "pypdf==6.9.2" \
            "websockets==15.0.1" \
            "jsonpath-ng==1.8.0" \
            "numpy==1.26.4" \
            "langchain==1.2.12" \
            "langchain-core==1.3.0" \
            "langchain-openai==1.1.11" \
            "openai==2.32.0" \
            "langchain-anthropic==1.3.4" \
            "anthropic==0.79.0" \
            "langchain-community==0.4.1" \
            "langchain-deepseek==1.0.1" \
            "langchain-google-genai==4.2.1" \
            "langchain-ollama==1.0.1" \
            "langchain-aws==1.4.0" \
            "langgraph==1.1.1" \
            "langgraph-prebuilt==1.0.8" \
            "deepagents==0.4.10" \
            "langchain-mcp-adapters==0.2.1" \
            "mcp==1.19.0" \
            "qianfan==0.4.12.3" \
            "zhipuai==2.1.5.20250708" \
            "volcengine-python-sdk[ark]==4.0.5" \
            "boto3==1.42.46" \
            "tencentcloud-sdk-python==3.0.1420" \
            "xinference-client==1.7.1.post1" \
            "dashscope==1.25.7" \
            "cohere==5.17.0" \
            "jieba==0.42.1" \
            "pylint==3.3.7" \
            "pycryptodome==3.23.0"

      - name: Wait For Postgres (matrix postgres only)
        if: matrix.db_backend == 'postgres'
        run: |
          python - <<'PY'
          import time
          import psycopg

          for i in range(40):
              try:
                  with psycopg.connect("host=127.0.0.1 port=5432 dbname=postgres user=postgres password=postgres"):
                      print("Postgres is ready")
                      break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Validate Django Configuration
        run: python apps/manage.py check

      - name: Run ${{ matrix.suite }} Tests (${{ matrix.db_backend }})
        run: python apps/manage.py test ${{ matrix.test_targets }} --noinput --verbosity=2

  coverage-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: django-test-suites
    env:
      PYTHONPATH: ${{ github.workspace }}/apps
      DJANGO_SETTINGS_MODULE: nebula.settings.test
      NEBULA_CONFIG_TYPE: ENV
      NEBULA_DATA_DIR: /tmp/nebula-ci-data
      NEBULA_DB_NAME: /tmp/nebula-coverage.sqlite3
      NEBULA_DB_HOST: 127.0.0.1
      NEBULA_DB_PORT: "5432"
      NEBULA_DB_USER: root
      NEBULA_DB_PASSWORD: test-password
      NEBULA_DB_ENGINE: django.db.backends.sqlite3
      NEBULA_REDIS_HOST: 127.0.0.1
      NEBULA_REDIS_PORT: "6379"
      NEBULA_REDIS_PASSWORD: test-password
      NEBULA_REDIS_DB: "0"
      NEBULA_REDIS_MAX_CONNECTIONS: "10"
      NEBULA_ENABLE_FORCE_GC: "0"
      NEBULA_LANGUAGE_CODE: zh-CN
      NEBULA_TIME_ZONE: Asia/Shanghai
      COVERAGE_FAIL_UNDER: "40"
      CORE_COVERAGE_SOURCE: apps/users,apps/chat,apps/knowledge,apps/tools,apps/application,apps/system_manage
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "coverage==7.6.1" \
            "django==5.2.12" \
            "drf-spectacular[sidecar]==0.28.0" \
            "django-redis==6.0.0" \
            "django-db-connection-pool==1.2.6" \
            "django-mptt==0.17.0" \
            "psycopg[binary]==3.2.9" \
            "python-dotenv==1.1.1" \
            "uuid-utils==0.14.0" \
            "captcha==0.7.1" \
            "pytz==2025.2" \
            "psutil==7.0.0" \
            "cffi==1.17.1" \
            "beautifulsoup4==4.13.4" \
            "requests==2.32.5" \
            "pydub==0.25.1" \
            "pysilk==0.0.1" \
            "celery[sqlalchemy]==5.5.3" \
            "django-celery-beat==2.9.0" \
            "celery-once==3.0.1" \
            "django-apscheduler==0.7.0" \
            "html2text==2025.4.15" \
            "openpyxl==3.1.5" \
            "python-docx==1.2.0" \
            "xlrd==2.0.2" \
            "xlwt==1.3.0" \
            "pymupdf==1.26.3" \
            "pypdf==6.9.2" \
            "websockets==15.0.1" \
            "jsonpath-ng==1.8.0" \
            "numpy==1.26.4" \
            "langchain==1.2.12" \
            "langchain-core==1.3.0" \
            "langchain-openai==1.1.11" \
            "openai==2.32.0" \
            "langchain-anthropic==1.3.4" \
            "anthropic==0.79.0" \
            "langchain-community==0.4.1" \
            "langchain-deepseek==1.0.1" \
            "langchain-google-genai==4.2.1" \
            "langchain-ollama==1.0.1" \
            "langchain-aws==1.4.0" \
            "langgraph==1.1.1" \
            "langgraph-prebuilt==1.0.8" \
            "deepagents==0.4.10" \
            "langchain-mcp-adapters==0.2.1" \
            "mcp==1.19.0" \
            "qianfan==0.4.12.3" \
            "zhipuai==2.1.5.20250708" \
            "volcengine-python-sdk[ark]==4.0.5" \
            "boto3==1.42.46" \
            "tencentcloud-sdk-python==3.0.1420" \
            "xinference-client==1.7.1.post1" \
            "dashscope==1.25.7" \
            "cohere==5.17.0" \
            "jieba==0.42.1" \
            "pylint==3.3.7" \
            "pycryptodome==3.23.0"

      - name: Run Coverage
        run: bash scripts/quality-gate.sh coverage

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nebula-coverage-report
          path: coverage.xml
          if-no-files-found: warn

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tool
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run dependency audit
        run: pip-audit --progress-spinner off
