name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      rollbackImage:
        description: 'Image to roll back to, for example nebulakb/nebula-kb:v2.0.0'
        required: true
      releaseUrl:
        description: 'Optional public URL for post-rollback /healthz and /readyz checks'
        required: false
        default: ''
      deployDir:
        description: 'Directory containing the NebulaKB deployment on the target host or runner'
        required: false
        default: '/opt/nebulakb'
      deployHost:
        description: 'Optional SSH host. Leave empty when running on a self-hosted deploy runner.'
        required: false
        default: ''
      deployUser:
        description: 'SSH user when deployHost is set'
        required: false
        default: 'deploy'
      runner:
        description: 'Runner label. Use a self-hosted deploy runner when not using SSH.'
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Roll back on current runner
        if: ${{ github.event.inputs.deployHost == '' }}
        env:
          NEBULA_ROLLBACK_IMAGE: ${{ github.event.inputs.rollbackImage }}
          NEBULA_RELEASE_URL: ${{ github.event.inputs.releaseUrl }}
          NEBULA_DEPLOY_DIR: ${{ github.event.inputs.deployDir }}
        run: ./scripts/rollback.sh

      - name: Prepare SSH key
        if: ${{ github.event.inputs.deployHost != '' }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.NEBULA_DEPLOY_SSH_KEY }}
          LEGACY_DEPLOY_SSH_KEY: ${{ secrets.LZKB_DEPLOY_SSH_KEY }}
        run: |
          DEPLOY_KEY="${DEPLOY_SSH_KEY:-${LEGACY_DEPLOY_SSH_KEY:-}}"
          test -n "$DEPLOY_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/nebula_deploy_key
          chmod 600 ~/.ssh/nebula_deploy_key

      - name: Roll back over SSH
        if: ${{ github.event.inputs.deployHost != '' }}
        env:
          ROLLBACK_IMAGE: ${{ github.event.inputs.rollbackImage }}
          RELEASE_URL: ${{ github.event.inputs.releaseUrl }}
          DEPLOY_DIR: ${{ github.event.inputs.deployDir }}
          DEPLOY_HOST: ${{ github.event.inputs.deployHost }}
          DEPLOY_USER: ${{ github.event.inputs.deployUser }}
        run: |
          ssh -i ~/.ssh/nebula_deploy_key -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_DIR}' && NEBULA_ROLLBACK_IMAGE='${ROLLBACK_IMAGE}' NEBULA_RELEASE_URL='${RELEASE_URL}' ./scripts/rollback.sh"
