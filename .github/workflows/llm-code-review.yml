name: PR Reminder

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, reopened]

jobs:
  pr-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Leave reminder comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Thanks for opening this PR to LZKB.',
              '',
              'Please make sure to:',
              '- include test/verification notes;',
              '- avoid committing secrets;',
              '- document any config key changes in `.env.example` and `config_example.yml`.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
