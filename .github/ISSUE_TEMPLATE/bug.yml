name: 'Bug Report'
description: 'Report a bug in NebulaKB'
title: '[Bug] '
body:
  - type: markdown
    attributes:
      value: '## Contact Information'
  - type: input
    validations:
      required: false
    attributes:
      label: 'Contact Information'
      description: 'How we can reach you for follow-up.'
  - type: markdown
    attributes:
      value: '## Environment Information'
  - type: input
    validations:
      required: true
    attributes:
      label: 'NebulaKB Version'
      description: 'Open About dialog in the top-right corner and copy the version string.'
  - type: markdown
    attributes:
      value: '## Detailed Information'
  - type: textarea
    attributes:
      label: 'Problem Description'
      description: 'Describe the issue clearly.'
    validations:
      required: true
  - type: textarea
    attributes:
      label: 'Steps to Reproduce'
      description: 'List exact steps to reproduce.'
    validations:
      required: true
  - type: textarea
    attributes:
      label: 'Expected Result'
  - type: textarea
    attributes:
      label: 'Related Logs'
      description: 'Paste relevant logs with sensitive data removed.'
      render: shell
  - type: textarea
    attributes:
      label: 'Additional Information'
      description: 'Screenshots/videos/extra context.'
