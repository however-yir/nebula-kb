name: 'Feature Request'
description: 'Suggest a new feature for LZKB'
title: '[Feature] '
body:
  - type: markdown
    attributes:
      value: '## Environment Information'
  - type: input
    validations:
      required: true
    attributes:
      label: 'LZKB Version'
      description: 'Open About dialog in the top-right corner and copy the version string.'
  - type: markdown
    attributes:
      value: '## Feature Details'
  - type: textarea
    attributes:
      label: 'Problem to solve'
      description: 'What problem does this feature address?'
    validations:
      required: true
  - type: textarea
    attributes:
      label: 'Proposed solution'
      description: 'How should this feature work?'
  - type: textarea
    attributes:
      label: 'Additional context'
      description: 'References, screenshots, links, or alternatives considered.'
