# LZKB file-based configuration template
# Use with: LZKB_CONFIG_TYPE=FILE and copy to config.yml

DB_NAME: lzkb
DB_HOST: 127.0.0.1
DB_PORT: 5432
DB_USER: root
DB_PASSWORD: CHANGE_ME_DB_PASSWORD
DB_ENGINE: dj_db_conn_pool.backends.postgresql
DB_MAX_OVERFLOW: 80

REDIS_HOST: 127.0.0.1
REDIS_PORT: 6379
REDIS_DB: 0
