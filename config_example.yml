# NebulaKB file-based configuration template
# Use with: NEBULA_CONFIG_TYPE=FILE and copy to config.yml

ENVIRONMENT: dev
SECRET_KEY: CHANGE_ME_DJANGO_SECRET_KEY
TOKEN_EXPIRE: 900
DATABASE_URL: postgresql://root:CHANGE_ME_DB_PASSWORD@127.0.0.1:5432/nebula
REDIS_URL: redis://:CHANGE_ME_REDIS_PASSWORD@127.0.0.1:6379/0

DB_NAME: nebula
DB_HOST: 127.0.0.1
DB_PORT: 5432
DB_USER: root
DB_PASSWORD: CHANGE_ME_DB_PASSWORD
DB_ENGINE: dj_db_conn_pool.backends.postgresql
DB_MAX_OVERFLOW: 80

REDIS_HOST: 127.0.0.1
REDIS_PORT: 6379
REDIS_DB: 0
REDIS_PASSWORD: CHANGE_ME_REDIS_PASSWORD
REDIS_MAX_CONNECTIONS: 100

LOCAL_MODEL_PROTOCOL: http
LOCAL_MODEL_HOST: 127.0.0.1
LOCAL_MODEL_PORT: 11636
LOCAL_MODEL_HOST_WORKER: 1
MODEL_SERVICE_HEALTHCHECK_ENABLED: true

LANGUAGE_CODE: zh-CN
TIME_ZONE: Asia/Shanghai
DEBUG: false
LOG_LEVEL: INFO
HTTP_LISTEN_PORT: 8080
SCHEDULER_HTTP_PORT: 6060

ADMIN_PATH: /admin
CHAT_PATH: /chat
DEFAULT_PASSWORD: ChangeMe@1234!

# Security
ALLOWED_HOSTS: localhost,127.0.0.1
CSRF_TRUSTED_ORIGINS:
CORS_ALLOWED_ORIGINS:
AUTH_ACCESS_TOKEN_TTL_SECONDS: 900
AUTH_REFRESH_TOKEN_TTL_SECONDS: 604800
AUTH_COOKIE_SECURE: false
AUTH_COOKIE_SAMESITE: Lax

# Brand & links
APP_NAME: NebulaKB
APPSTORE_URL: https://raw.githubusercontent.com/however-yir/nebula-kb/main/appstore/nebula.json
PROJECT_URL: https://github.com/however-yir/nebula-kb
HELP_URL: https://docs.nebulakb.ai
DOCS_URL: https://docs.nebulakb.ai
PRICING_URL: https://nebulakb.ai/pricing
CONTACT_URL: https://github.com/however-yir/nebula-kb/issues
OFFICIAL_SITE_URL: https://nebulakb.ai
CHAT_FLOAT_ICON: NebulaKB.gif

# Ollama
OLLAMA_BASE_URL: http://127.0.0.1:11434

# Object storage. Use STORAGE_BACKEND: s3 for MinIO/S3-compatible storage.
STORAGE_BACKEND: local
STORAGE_ENDPOINT:
STORAGE_BUCKET:
STORAGE_ACCESS_KEY:
STORAGE_SECRET_KEY:
STORAGE_REGION:
STORAGE_HEALTHCHECK_URL:
STORAGE_FORCE_PATH_STYLE: true
