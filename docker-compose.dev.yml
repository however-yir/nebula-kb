services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nebula-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEBULA_DB_NAME:-${LZKB_DB_NAME:-nebula}}
      POSTGRES_USER: ${NEBULA_DB_USER:-${LZKB_DB_USER:-root}}
      POSTGRES_PASSWORD: ${NEBULA_DB_PASSWORD:-${LZKB_DB_PASSWORD:-CHANGE_ME_DB_PASSWORD}}
    ports:
      - "${NEBULA_DB_PORT:-${LZKB_DB_PORT:-5432}}:5432"
    volumes:
      - nebula_postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/initdb:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: nebula-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${NEBULA_REDIS_PASSWORD:-${LZKB_REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}}"]
    ports:
      - "${NEBULA_REDIS_PORT:-${LZKB_REDIS_PORT:-6379}}:6379"
    volumes:
      - nebula_redis_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: nebula-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - nebula_ollama_data:/root/.ollama

volumes:
  nebula_postgres_data:
  nebula_redis_data:
  nebula_ollama_data:
