services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    volumes:
      - lzkb_postgres_data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - lzkb_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 12

  object-storage:
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - lzkb_object_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  object-storage-init:
    image: minio/mc:latest
    depends_on:
      object-storage:
        condition: service_healthy
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    entrypoint: >
      /bin/sh -c "
      mc alias set lzkb http://object-storage:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing lzkb/$${STORAGE_BUCKET:-lzkb}
      "
    restart: "no"

  local-model:
    image: ${LZKB_IMAGE:-ghcr.io/however-yir/lzkb:latest}
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["./scripts/run-service.sh", "local_model"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11636/readyz"]
      interval: 15s
      timeout: 5s
      retries: 20

  web:
    image: ${LZKB_IMAGE:-ghcr.io/however-yir/lzkb:latest}
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["./scripts/run-service.sh", "web"]
    ports:
      - "${LZKB_WEB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      local-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 20

  worker:
    image: ${LZKB_IMAGE:-ghcr.io/however-yir/lzkb:latest}
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["./scripts/run-service.sh", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      local-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/readyz"]
      interval: 15s
      timeout: 5s
      retries: 20

  scheduler:
    image: ${LZKB_IMAGE:-ghcr.io/however-yir/lzkb:latest}
    restart: unless-stopped
    env_file:
      - ${LZKB_ENV_FILE:-./env/dev.env}
    command: ["./scripts/run-service.sh", "scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy
      local-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6060/readyz"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  lzkb_postgres_data:
  lzkb_redis_data:
  lzkb_object_data:
